# ===================================================================
# AEGIS BACKEND CONFIGURATION
# ===================================================================

spring:
  application:
    name: aegis-backend

  # Database: MongoDB (Encrypted Document Blobs)
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/aegis_vault}

  # Database: MySQL (Relational Metadata & Identity)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aegis_metadata}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Persistence Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Security Handshake Configuration
server:
  pepper: ${SERVER_PEPPER:change-me-before-deploy}
  jwt-secret: ${SERVER_JWT_SECRET:change-me-before-deploy}