spring:
  application:
    name: snm-backend

  data:
    mongodb:
      uri: mongodb://localhost:27017/snm-db

  datasource:
    url: jdbc:mysql://localhost:3306/snm_metadata
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true